<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>html,body{margin:0;padding:0;background:#fff;}</style>
</head>
<body>
  <div id="main" style="width:900px;height:600px;"></div>
  <script>
var chartDom = document.getElementById('main');
var myChart = echarts.init(chartDom);

// === MODULE: THEME CONFIGURATION ===
var theme = {
  colors: {
    CD: '#9AD6E8', // 浅蓝
    BD: '#003366', // 深蓝 → enhanced contrast vs CF
    AD: '#95D666', // 浅绿
    CF: '#0066A6', // 中蓝 → adjusted for better BD/CF distinction
    BF: '#999999', // 灰色
    AF: '#FCC89E'  // 浅橙
  },
  fontSize: {
    title: 18,
    axisLabel: 14,
    legend: 13,
    tableText: 12,
    tableTitle: 14,
    stats: 13
  },
  gridPadding: {
    left: '10%',
    right: '15%',
    top: '15%',
    bottom: '10%'
  },
  tablePosition: {
    width: 220,
    height: 130,
    right: 30,
    bottom: 30
  }
};

// === MODULE: DATA GENERATION ===
/**
 * Generates scatter data points approximating observed distribution characteristics:
 * - CD: centroid near (-15, 1.5), tight X-spread (15), small Y-spread (3)
 * - BD: centroid on Y-axis (0, 1.5), ultra-tight X-spread (2) → "zero centroid offset"
 * - AD: large positive centroid (35, 3), high dispersion (30x4) → "max edge height & offset"
 * - CF: negative centroid (-20, -2), medium spread (15x3) → "negative edge height difference"
 * - BF: centroid on Y-axis (0, -2), tight X-spread (2), moderate Y-spread (4)
 * - AF: positive centroid (20, -1), medium spread (20x3) → "positive offset, negative height diff"
 * @param {number} centroidX - Centroid offset (mm), aligned with report terminology
 * @param {number} centroidY - Edge height difference (mm), aligned with report terminology
 * @param {number} count - Number of points
 * @param {number} clusterTightnessX - X-direction clustering tightness (mm)
 * @param {number} clusterTightnessY - Y-direction clustering tightness (mm)
 * @returns {{data: Array<Array<number>>, centroid: [number, number], spread: [number, number]}}
 */
function generateData(centroidX, centroidY, count, clusterTightnessX, clusterTightnessY) {
  if (count <= 0 || !Number.isFinite(clusterTightnessX) || !Number.isFinite(clusterTightnessY)) {
    throw new Error('Invalid generateData input: count must be > 0, spreads must be finite');
  }
  
  var data = [];
  for (var i = 0; i < count; i++) {
    // Use symmetric uniform perturbation for stable reproducible shape
    var x = centroidX + (Math.random() - 0.5) * clusterTightnessX * 2;
    var y = centroidY + (Math.random() - 0.5) * clusterTightnessY * 2;
    // Add subtle secondary jitter for natural appearance
    if (Math.random() > 0.5) {
      x += (Math.random() - 0.5) * clusterTightnessX * 0.5;
      y += (Math.random() - 0.5) * clusterTightnessY * 0.5;
    }
    data.push([x, y]);
  }
  return {
    data: data,
    centroid: [centroidX, centroidY],
    spread: [clusterTightnessX, clusterTightnessY]
  };
}

// Generate grouped data with structured return
var cdData = generateData(-15, 1.5, 35, 15, 3);
var bdData = generateData(0, 1.5, 80, 2, 3);
var adData = generateData(35, 3, 146, 30, 4);
var cfData = generateData(-20, -2, 215, 15, 3);
var bfData = generateData(0, -2, 77, 2, 4);
var afData = generateData(20, -1, 74, 20, 3);

// === MODULE: OPTION BUILDING ===
var option = {
  backgroundColor: '#fff',
  title: {
    text: '散点图',
    left: 'center',
    top: 0,
    backgroundColor: '#00B5B5',
    textStyle: {
      color: '#000',
      fontSize: theme.fontSize.title,
      fontFamily: 'serif'
    },
    padding: [5, 0, 5, 0]
  },
  tooltip: {
    trigger: 'item'
  },
  legend: {
    data: ['CD', 'BD', 'AD', 'CF', 'BF', 'AF'],
    type: 'plain',
    orient: 'vertical',
    left: '10%',
    top: '15%',
    itemWidth: 12,
    itemHeight: 12,
    textStyle: {
      fontSize: theme.fontSize.legend
    }
  },
  grid: theme.gridPadding,
  xAxis: {
    type: 'value',
    min: -50,
    max: 100,
    interval: 50, // ✅ Enforced ticks: [-50, 0, 50, 100]
    splitLine: {
      show: true,
      lineStyle: {
        color: ['#ff0000'], // Red dashed zero-line at X=0 only
        type: 'dashed',
        width: 1
      },
      // Only draw at X=0 by overriding splitArea — but ECharts doesn't support per-value splitLine,
      // so we use graphic-based zero lines instead (see below) and disable splitLine here.
      // Instead, we'll draw precise zero lines via graphic with zlevel control.
    },
    axisLine: {
      lineStyle: {
        color: '#000',
        width: 1
      }
    },
    axisLabel: {
      color: '#000',
      fontSize: theme.fontSize.axisLabel,
      formatter: function (value) {
        if (value === -50) return '-50(C)';
        if (value === 0) return '0(B)';
        if (value === 50) return '50';
        if (value === 100) return '100(A)';
        return '';
      }
    },
    name: 'Centroid offset (mm)',
    nameLocation: 'middle',
    nameGap: 30,
    nameTextStyle: {
      fontSize: 16
    }
  },
  yAxis: {
    type: 'value',
    min: -8,
    max: 10,
    interval: 2, // ✅ Enforced ticks: [-8, -6, -4, -2, 0, 2, 4, 6, 8, 10]
    splitLine: {
      show: true,
      lineStyle: {
        color: ['#ff0000'], // Red dashed zero-line at Y=0 only
        type: 'dashed',
        width: 1
      }
    },
    axisLine: {
      lineStyle: {
        color: '#000',
        width: 1
      }
    },
    axisLabel: {
      color: '#000',
      fontSize: theme.fontSize.axisLabel,
      formatter: function (value) {
        if (value === -8) return '-8(F)';
        if (value === 0) return '0(E)';
        if (value === 10) return '10(D)';
        return '';
      }
    },
    name: 'Edge height difference (mm)',
    nameLocation: 'middle',
    nameGap: 50,
    nameTextStyle: {
      fontSize: 16
    },
    nameRotate: 90
  },
  graphic: [
    // Zero-axis cross: red dashed lines at X=0 and Y=0, zlevel=0 (background)
    {
      type: 'line',
      shape: {
        x1: 0, y1: 0,
        x2: 0, y2: 1
      },
      position: ['50%', '50%'],
      shape: {
        x1: 0, y1: -500, // extend beyond bounds
        x2: 0, y2: 500
      },
      style: {
        stroke: '#ff0000',
        lineWidth: 1,
        lineDash: [4, 4]
      },
      zlevel: 0
    },
    {
      type: 'line',
      shape: {
        x1: -500, y1: 0,
        x2: 500, y2: 0
      },
      position: ['50%', '50%'],
      style: {
        stroke: '#ff0000',
        lineWidth: 1,
        lineDash: [4, 4]
      },
      zlevel: 0
    },
    // Statistical table group — anchored to bottom-right
    {
      type: 'group',
      right: theme.tablePosition.right,
      bottom: theme.tablePosition.bottom,
      children: [
        // Table background
        {
          type: 'rect',
          shape: {
            x: 0,
            y: 0,
            width: theme.tablePosition.width,
            height: theme.tablePosition.height
          },
          style: {
            fill: '#e0e0e0', // ✅ Corrected gray tone
            stroke: '#cccccc', // ✅ Lighter border
            lineWidth: 0.5 // ✅ Thin border
          }
        },
        // Title bar
        {
          type: 'rect',
          shape: {
            x: 0,
            y: 0,
            width: theme.tablePosition.width,
            height: 25
          },
          style: {
            fill: '#999',
            stroke: '#999'
          }
        },
        // Title text
        {
          type: 'text',
          style: {
            text: 'Count & χ² Test',
            x: theme.tablePosition.width / 2,
            y: 17,
            textAlign: 'center',
            fill: '#fff',
            fontSize: theme.fontSize.tableTitle,
            fontWeight: 'bold'
          }
        },
        // Row 1: CD, BD, AD
        // CD
        { type: 'circle', shape: { cx: 30, cy: 50, r: 4 }, style: { fill: theme.colors.CD } },
        { type: 'text', style: { text: '35', x: 45, y: 50, textAlign: 'left', fill: '#000', fontSize: theme.fontSize.tableText } },
        // BD
        { type: 'circle', shape: { cx: 90, cy: 50, r: 4 }, style: { fill: theme.colors.BD } },
        { type: 'text', style: { text: '80', x: 105, y: 50, textAlign: 'left', fill: '#000', fontSize: theme.fontSize.tableText } },
        // AD
        { type: 'circle', shape: { cx: 150, cy: 50, r: 4 }, style: { fill: theme.colors.AD } },
        { type: 'text', style: { text: '146', x: 165, y: 50, textAlign: 'left', fill: '#000', fontSize: theme.fontSize.tableText } },

        // Row 2: CF, BF, AF
        // CF
        { type: 'circle', shape: { cx: 30, cy: 80, r: 4 }, style: { fill: theme.colors.CF } },
        { type: 'text', style: { text: '215', x: 45, y: 80, textAlign: 'left', fill: '#000', fontSize: theme.fontSize.tableText } },
        // BF
        { type: 'circle', shape: { cx: 90, cy: 80, r: 4 }, style: { fill: theme.colors.BF } },
        { type: 'text', style: { text: '77', x: 105, y: 80, textAlign: 'left', fill: '#000', fontSize: theme.fontSize.tableText } },
        // AF
        { type: 'circle', shape: { cx: 150, cy: 80, r: 4 }, style: { fill: theme.colors.AF } },
        { type: 'text', style: { text: '74', x: 165, y: 80, textAlign: 'left', fill: '#000', fontSize: theme.fontSize.tableText } },

        // χ² result
        {
          type: 'text',
          style: {
            text: 'χ² = 508.458      P < 0.01',
            x: theme.tablePosition.width / 2,
            y: 110,
            textAlign: 'center',
            fill: '#000',
            fontSize: theme.fontSize.stats,
            fontStyle: 'italic'
          }
        }
      ]
    },
    // Watermark
    {
      type: 'text',
      right: 20,
      bottom: 20,
      style: {
        text: '博硕科研绘图',
        fill: '#ccc',
        fontSize: 14,
        opacity: 0.7
      }
    }
  ],
  series: [
    {
      name: 'CD',
      type: 'scatter',
      symbolSize: 10,
      itemStyle: { color: theme.colors.CD },
      data: cdData.data
    },
    {
      name: 'BD',
      type: 'scatter',
      symbolSize: 10,
      itemStyle: { color: theme.colors.BD },
      data: bdData.data
    },
    {
      name: 'AD',
      type: 'scatter',
      symbolSize: 10,
      itemStyle: { color: theme.colors.AD },
      data: adData.data
    },
    {
      name: 'CF',
      type: 'scatter',
      symbolSize: 10,
      itemStyle: { color: theme.colors.CF },
      data: cfData.data
    },
    {
      name: 'BF',
      type: 'scatter',
      symbolSize: 10,
      itemStyle: { color: theme.colors.BF },
      data: bfData.data
    },
    {
      name: 'AF',
      type: 'scatter',
      symbolSize: 10,
      itemStyle: { color: theme.colors.AF },
      data: afData.data
    }
  ]
};

myChart.setOption(option);
  </script>
</body>
</html>
