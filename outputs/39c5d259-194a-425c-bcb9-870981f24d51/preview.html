<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>html,body{margin:0;padding:0;background:#fff;}</style>
</head>
<body>
  <div id="main" style="width:900px;height:600px;"></div>
  <script>
// 获取容器
var chartDom = document.getElementById('main');
var myChart = echarts.init(chartDom);
var option;

// 模拟数据生成函数
// 为了复现图中的分布，我们需要根据视觉聚类生成随机数据
function generateScatterData(count, centerX, centerY, spreadX, spreadY) {
    var data = [];
    for (var i = 0; i < count; i++) {
        // 使用简单的正态分布模拟
        var x = centerX + (Math.random() - 0.5) * spreadX;
        var y = centerY + (Math.random() - 0.5) * spreadY;
        // 添加一些随机扰动让分布更自然
        if (Math.random() > 0.8) {
             x += (Math.random() - 0.5) * spreadX * 0.5;
             y += (Math.random() - 0.5) * spreadY * 0.5;
        }
        data.push([x, y]);
    }
    return data;
}

// 根据图中右下角的统计数量生成数据
// CD: 35, BD: 80, AD: 146, CF: 215, BF: 77, AF: 74
var dataCD = generateScatterData(35, -20, 2, 20, 4);   // 左上 (浅蓝)
var dataBD = generateScatterData(80, 0, 1.5, 2, 6);    // 中上竖条 (深蓝)
var dataAD = generateScatterData(146, 30, 4, 40, 8);   // 右上 (浅绿)
var dataCF = generateScatterData(215, -15, -3, 25, 5); // 左下 (中蓝)
var dataBF = generateScatterData(77, 0, -3, 2, 6);     // 中下竖条 (灰)
var dataAF = generateScatterData(74, 15, -1, 25, 4);   // 右下 (浅橙)

option = {
    backgroundColor: '#fff',
    title: {
        text: '散点图',
        left: 'center',
        top: 0,
        backgroundColor: '#00B5B5', // 顶部青色条
        width: '100%',
        padding: [10, 0],
        textStyle: {
            color: '#000',
            fontSize: 18,
            fontFamily: 'KaiTi' // 尝试模仿手写/楷体风格
        }
    },
    tooltip: {
        trigger: 'item'
    },
    legend: {
        data: ['CD', 'BD', 'AD', 'CF', 'BF', 'AF'],
        top: 40,
        left: 50,
        textStyle: {
            fontSize: 14
        }
    },
    grid: {
        left: '10%',
        right: '10%',
        bottom: '15%',
        top: '15%',
        containLabel: true
    },
    xAxis: {
        type: 'value',
        min: -50,
        max: 100,
        name: 'Centroid offset (mm)',
        nameLocation: 'middle',
        nameGap: 30,
        axisLine: {
            lineStyle: {
                color: '#000'
            }
        },
        axisTick: {
            show: true,
            lineStyle: {
                color: '#000'
            }
        },
        axisLabel: {
            color: '#000',
            formatter: function (value) {
                if (value === -50) return '-50(C)';
                if (value === 0) return '0(B)';
                if (value === 50) return '50';
                if (value === 100) return '100(A)';
                return value;
            }
        },
        splitLine: {
            show: false
        }
    },
    yAxis: {
        type: 'value',
        min: -8,
        max: 10,
        name: 'Edge height difference (mm)',
        nameRotate: 0,
        nameLocation: 'start',
        nameGap: 50, // 调整名称位置
        axisLine: {
            lineStyle: {
                color: '#000'
            }
        },
        axisTick: {
            show: true,
            lineStyle: {
                color: '#000'
            }
        },
        axisLabel: {
            color: '#000',
            formatter: function (value) {
                if (value === 10) return '10(D)';
                if (value === 0) return '0(E)';
                if (value === -8) return '-8(F)';
                return value;
            }
        },
        splitLine: {
            show: false
        }
    },
    series: [
        {
            name: 'CD',
            type: 'scatter',
            data: dataCD,
            itemStyle: { color: '#9CDCF0' }
        },
        {
            name: 'BD',
            type: 'scatter',
            data: dataBD,
            itemStyle: { color: '#006699' }
        },
        {
            name: 'AD',
            type: 'scatter',
            data: dataAD,
            itemStyle: { color: '#A6D658' }
        },
        {
            name: 'CF',
            type: 'scatter',
            data: dataCF,
            itemStyle: { color: '#2E86C1' }
        },
        {
            name: 'BF',
            type: 'scatter',
            data: dataBF,
            itemStyle: { color: '#999999' }
        },
        {
            name: 'AF',
            type: 'scatter',
            data: dataAF,
            itemStyle: { color: '#FAD6A5' }
        }
    ],
    // 添加辅助线
    graphic: [
        // X=0 的红色虚线
        {
            type: 'line',
            left: '50%', // 对应 X=0，因为范围是 -50 到 100，0 在中间偏左，这里需要精确计算
            // 实际上 grid.left='10%', grid.right='10%'，X轴范围 150。
            // X=0 的位置比例 = (0 - (-50)) / 150 = 1/3。
            // 所以 left 应该是 grid.left + grid.width * (1/3)
            // 为了简单，我们使用 markLine，但 markLine 在 series 里。
            // 这里用 graphic 画十字线更灵活
            shape: {
                x1: 0, y1: 0, x2: 0, y2: 0 // 占位，下面用 transform
            },
            position: [0, 0], // 会在 setOption 后由 echarts 自动计算，或者我们手动算
            // 更好的方法是用 markLine，但为了控制全局样式，这里用 graphic 模拟
            // 由于 graphic 坐标是相对于容器的，计算比较麻烦。
            // 我们改用 series 中的 markLine 来实现十字线，这更标准。
        }
    ],
    // 使用 series 中的 markLine 绘制十字辅助线
    // 为了不让 markLine 出现在图例里，我们把它放在一个不可见的系列或者单独配置
    // 这里我们直接在 series 配置里加 markLine 可能会污染图例，
    // 最好的办法是加一个空的 series 专门画线，或者在每个 series 里都画（会有重叠但效果一样）
    // 这里选择在每个系列里都加上 markLine，确保线在最上层或者通过 zlevel 控制
    // 修正：直接在 option 级别不好加全局 markLine，我们在第一个系列加，并设置 symbol: 'none'
    
    // 右下角的统计表格 (使用 graphic 组件绘制)
    graphic: [
        {
            type: 'group',
            right: 60,
            bottom: 60,
            children: [
                {
                    type: 'rect',
                    shape: {
                        x: 0,
                        y: 0,
                        width: 220,
                        height: 130
                    },
                    style: {
                        fill: '#E8E8E8',
                        stroke: '#999',
                        lineWidth: 1,
                        opacity: 0.9
                    }
                },
                // 标题栏背景
                {
                    type: 'rect',
                    shape: { x: 0, y: 0, width: 220, height: 25 },
                    style: { fill: '#999', opacity: 0.8 }
                },
                // 标题文字
                {
                    type: 'text',
                    style: {
                        text: 'Count & χ² Test',
                        x: 110,
                        y: 18,
                        textAlign: 'center',
                        textVerticalAlign: 'middle',
                        fill: '#fff',
                        font: 'bold 14px sans-serif'
                    }
                },
                // 第一行数据
                {
                    type: 'text',
                    style: {
                        text: 'CD  35',
                        x: 30,
                        y: 55,
                        fill: '#000',
                        font: '12px sans-serif'
                    }
                },
                {
                    type: 'circle',
                    shape: { cx: 15, cy: 55, r: 4 },
                    style: { fill: '#9CDCF0' }
                },
                
                {
                    type: 'text',
                    style: {
                        text: 'BD  80',
                        x: 90,
                        y: 55,
                        fill: '#000',
                        font: '12px sans-serif'
                    }
                },
                {
                    type: 'circle',
                    shape: { cx: 75, cy: 55, r: 4 },
                    style: { fill: '#006699' }
                },

                {
                    type: 'text',
                    style: {
                        text: 'AD  146',
                        x: 150,
                        y: 55,
                        fill: '#000',
                        font: '12px sans-serif'
                    }
                },
                {
                    type: 'circle',
                    shape: { cx: 135, cy: 55, r: 4 },
                    style: { fill: '#A6D658' }
                },

                // 第二行数据
                {
                    type: 'text',
                    style: {
                        text: 'CF  215',
                        x: 30,
                        y: 85,
                        fill: '#000',
                        font: '12px sans-serif'
                    }
                },
                {
                    type: 'circle',
                    shape: { cx: 15, cy: 85, r: 4 },
                    style: { fill: '#2E86C1' }
                },

                {
                    type: 'text',
                    style: {
                        text: 'BF  77',
                        x: 90,
                        y: 85,
                        fill: '#000',
                        font: '12px sans-serif'
                    }
                },
                {
                    type: 'circle',
                    shape: { cx: 75, cy: 85, r: 4 },
                    style: { fill: '#999999' }
                },

                {
                    type: 'text',
                    style: {
                        text: 'AF  74',
                        x: 150,
                        y: 85,
                        fill: '#000',
                        font: '12px sans-serif'
                    }
                },
                {
                    type: 'circle',
                    shape: { cx: 135, cy: 85, r: 4 },
                    style: { fill: '#FAD6A5' }
                },

                // 底部统计值
                {
                    type: 'text',
                    style: {
                        text: 'χ² = 508.458',
                        x: 60,
                        y: 115,
                        fill: '#000',
                        font: '12px sans-serif'
                    }
                },
                {
                    type: 'text',
                    style: {
                        text: 'P < 0.01',
                        x: 170,
                        y: 115,
                        fill: '#000',
                        font: '12px sans-serif'
                    }
                }
            ]
        },
        // 绘制红色辅助线 (使用 graphic line 更灵活，可以跨系列)
        // 计算坐标：
        // X轴范围 -50 到 100 (跨度 150)。0 在 1/3 处。
        // Y轴范围 -8 到 10 (跨度 18)。0 在 8/18 = 4/9 处。
        // 由于 grid 是动态的，这里用 markLine 更稳妥，但为了代码整洁，我们在 series 里加
        {
            type: 'line',
            // 这是一个 hack，利用 graphic 画线需要知道具体像素，
            // 我们这里用 series 中的 markLine 来实现十字线，
            // 为了不让它出现在图例，我们把它放在一个单独的 series 里，且不显示在 legend 中
        }
    ]
};

// 为了添加十字线且不干扰图例，我们添加一个额外的 series
option.series.push({
    type: 'scatter',
    symbol: 'none', // 不显示点
    markLine: {
        symbol: 'none',
        lineStyle: {
            color: '#FFA07A', // 浅红色
            type: 'dashed',
            width: 1
        },
        data: [
            { xAxis: 0 }, // Y轴辅助线
            { yAxis: 0 }  // X轴辅助线
        ]
    },
    data: [] // 空数据
});

// 添加右下角水印
option.graphic.push({
    type: 'text',
    right: 20,
    bottom: 10,
    style: {
        text: '博硕科研绘图',
        font: '14px cursive',
        fill: '#ccc',
        textAlign: 'right'
    }
});

myChart.setOption(option);
  </script>
</body>
</html>
