<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>html,body{margin:0;padding:0;background:#fff;}</style>
</head>
<body>
  <div id="main" style="width:900px;height:600px;"></div>
  <script>
// 获取 DOM 容器
var chartDom = document.getElementById('main');
var myChart = echarts.init(chartDom);
var option;

// 模拟数据生成函数，用于复现图中的数据分布趋势
function generateData(count, xMin, xMax, yMin, yMax) {
    var data = [];
    for (var i = 0; i < count; i++) {
        var x = Math.random() * (xMax - xMin) + xMin;
        var y = Math.random() * (yMax - yMin) + yMin;
        data.push([x, y]);
    }
    return data;
}

// 根据图中分布大致模拟六组数据
// CD: 左上 (x<0, y>0)
var dataCD = generateData(35, -20, 0, 0, 5); 
// BD: 中上 (x~0, y>0)
var dataBD = generateData(80, -2, 2, 0, 3);
// AD: 右上 (x>0, y>0) - 分布最广
var dataAD = generateData(146, 0, 80, 0, 10);
// CF: 左下 (x<0, y<0)
var dataCF = generateData(215, -40, 0, -7, 0);
// BF: 中下 (x~0, y<0)
var dataBF = generateData(77, -2, 2, -6, 0);
// AF: 右下 (x>0, y<0)
var dataAF = generateData(74, 0, 30, -5, 0);

option = {
    backgroundColor: '#fff',
    title: {
        text: '散点图',
        left: 'center',
        top: 0,
        backgroundColor: '#00B4B4', // 顶部青色条
        textStyle: {
            color: '#000',
            fontSize: 24,
            fontFamily: 'KaiTi' // 尝试模仿手写体或衬线体
        },
        padding: [10, 0, 10, 0]
    },
    tooltip: {
        trigger: 'item',
        formatter: function (params) {
            return params.seriesName + ':<br/>X: ' + params.data[0].toFixed(2) + '<br/>Y: ' + params.data[1].toFixed(2);
        }
    },
    legend: {
        data: ['CD', 'BD', 'AD', 'CF', 'BF', 'AF'],
        left: '10%',
        top: 60,
        orient: 'vertical',
        itemWidth: 10,
        itemHeight: 10,
        textStyle: {
            fontSize: 14
        }
    },
    grid: {
        left: '10%',
        right: '10%',
        bottom: '10%',
        top: '15%',
        containLabel: true
    },
    xAxis: {
        type: 'value',
        name: 'Centroid offset (mm)',
        nameLocation: 'middle',
        nameGap: 30,
        min: -50,
        max: 100,
        splitLine: {
            show: true,
            lineStyle: {
                type: 'dashed'
            }
        },
        axisLabel: {
            formatter: function (value) {
                if (value === -50) return '-50(C)';
                if (value === 0) return '0(B)';
                if (value === 100) return '100(A)';
                return value;
            }
        }
    },
    yAxis: {
        type: 'value',
        name: 'Edge height difference (mm)',
        nameLocation: 'middle',
        nameGap: 50,
        min: -8,
        max: 10,
        splitLine: {
            show: true,
            lineStyle: {
                type: 'dashed'
            }
        },
        axisLabel: {
            formatter: function (value) {
                if (value === 10) return '10(D)';
                if (value === 0) return '0(E)';
                if (value === -8) return '-8(F)';
                return value;
            }
        }
    },
    series: [
        {
            name: 'CD',
            type: 'scatter',
            itemStyle: { color: '#89CFF0' }, // 浅蓝
            data: dataCD
        },
        {
            name: 'BD',
            type: 'scatter',
            itemStyle: { color: '#008B8B' }, // 深青
            data: dataBD
        },
        {
            name: 'AD',
            type: 'scatter',
            itemStyle: { color: '#90EE90' }, // 浅绿
            data: dataAD
        },
        {
            name: 'CF',
            type: 'scatter',
            itemStyle: { color: '#1E90FF' }, // 中蓝
            data: dataCF
        },
        {
            name: 'BF',
            type: 'scatter',
            itemStyle: { color: '#A9A9A9' }, // 灰色
            data: dataBF
        },
        {
            name: 'AF',
            type: 'scatter',
            itemStyle: { color: '#FFDAB9' }, // 浅橙/肉色
            data: dataAF
        }
    ],
    // 使用 graphic 组件绘制右下角的统计表格
    graphic: {
        elements: [
            {
                type: 'group',
                left: '65%',
                bottom: '15%',
                children: [
                    {
                        type: 'rect',
                        shape: {
                            width: 220,
                            height: 140,
                            x: 0,
                            y: 0
                        },
                        style: {
                            fill: '#E0E0E0', // 背景灰
                            stroke: '#999',
                            lineWidth: 1
                        }
                    },
                    {
                        type: 'text',
                        style: {
                            text: [
                                '{title|Count & χ² Test}',
                                '{row|CD  35      BD  80      AD  146}',
                                '{row|CF  215     BF  77      AF  74}',
                                '{stat|χ² = 508.458   P < 0.01}'
                            ].join('\n'),
                            left: 10,
                            top: 10,
                            font: '14px sans-serif',
                            fill: '#333',
                            align: 'left',
                            verticalAlign: 'top',
                            rich: {
                                title: {
                                    fontSize: 14,
                                    fontWeight: 'bold',
                                    fill: '#fff',
                                    backgroundColor: '#999',
                                    padding: [2, 60], // 模拟标题栏宽度
                                    align: 'center',
                                    width: 200
                                },
                                row: {
                                    fontSize: 13,
                                    lineHeight: 25,
                                    width: 200,
                                    padding: [0, 10]
                                },
                                stat: {
                                    fontSize: 13,
                                    fontStyle: 'italic',
                                    lineHeight: 30,
                                    width: 200,
                                    padding: [5, 10]
                                }
                            }
                        }
                    }
                ]
            }
        ]
    }
};

myChart.setOption(option);
  </script>
</body>
</html>
